<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dspec — CRC Card Designer</title>
<style>
:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --card: #0f3460;
  --accent: #e94560;
  --text: #eee;
  --text-dim: #999;
  --text-dark: #666;
  --green: #4ecca3;
  --yellow: #f0c040;
  --blue: #4ea8de;
  --orange: #e07838;
  --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  --mono: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  --edit-glow: #e9456040;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── Header ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 24px;
  background: var(--surface);
  border-bottom: 1px solid #ffffff10;
}

header h1 { font-size: 20px; font-weight: 600; letter-spacing: 1px; }
header h1 span { color: var(--accent); }

.header-actions { display: flex; gap: 8px; align-items: center; }

.btn {
  padding: 8px 16px;
  border: 1px solid #ffffff20;
  border-radius: 6px;
  background: transparent;
  color: var(--text);
  font-size: 13px;
  cursor: pointer;
  font-family: var(--font);
  transition: all 0.15s;
}
.btn:hover { background: #ffffff10; }
.btn-accent { border-color: var(--accent); color: var(--accent); }
.btn-accent:hover { background: var(--accent); color: white; }
.btn-green { border-color: var(--green); color: var(--green); }
.btn-green:hover { background: var(--green); color: var(--bg); }
.btn-sm { padding: 5px 10px; font-size: 12px; }

/* ── Toolbar ── */
.toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 24px;
  background: var(--surface);
  border-bottom: 1px solid #ffffff08;
  font-size: 13px;
}
.toolbar label { color: var(--text-dim); }
.toolbar select {
  padding: 5px 8px;
  border: 1px solid #ffffff15;
  border-radius: 4px;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  font-family: var(--font);
}

.chip {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.chip-count { background: var(--accent); color: white; }
.chip-sync { background: var(--green); color: var(--bg); }
.chip-offline { background: var(--text-dark); color: var(--text); }

/* ── Peer indicators ── */
.peers {
  display: flex;
  gap: 4px;
  align-items: center;
}
.peer-dot {
  width: 22px; height: 22px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  font-weight: 700;
  color: white;
  border: 2px solid var(--bg);
}

/* ── Board ── */
.board {
  display: flex;
  flex-wrap: wrap;
  gap: 24px;
  padding: 24px;
  align-items: flex-start;
  position: relative;
  z-index: 1;
}

/* ── CRC Card (both view and edit share this shell) ── */
.crc-card {
  width: 480px;
  background: var(--card);
  border: 2px solid #ffffff15;
  border-radius: 10px;
  overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.crc-card:hover {
  border-color: var(--accent);
  box-shadow: 0 4px 24px #e9456030;
}
.crc-card.editing {
  border-color: var(--green);
  box-shadow: 0 4px 30px #4ecca340;
  width: 540px;
}
.crc-card.peer-editing {
  border-color: var(--yellow);
  box-shadow: 0 4px 24px #f0c04030;
}

/* ── Card Header ── */
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: linear-gradient(135deg, #e9456018, transparent);
  border-bottom: 1px solid #ffffff10;
}
.card-header.edit-header {
  background: linear-gradient(135deg, #4ecca318, transparent);
}
.card-name {
  font-size: 17px;
  font-weight: 700;
  font-family: var(--mono);
}
.card-package {
  font-size: 11px;
  color: var(--accent);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.card-actions { display: flex; gap: 4px; }
.card-btn {
  width: 28px; height: 28px;
  border: none; border-radius: 4px;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 14px;
  display: flex; align-items: center; justify-content: center;
}
.card-btn:hover { background: #ffffff15; color: var(--text); }
.card-btn.delete:hover { color: var(--accent); }

/* ── Card Purpose ── */
.card-purpose {
  padding: 8px 16px;
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.5;
  border-bottom: 1px solid #ffffff08;
  font-style: italic;
}

/* ── Card Body (two-column CRC layout) ── */
.card-body {
  display: grid;
  grid-template-columns: 1fr 1fr;
  min-height: 100px;
}
.card-col { padding: 10px 16px; }
.card-col:first-child { border-right: 1px solid #ffffff08; }
.card-col h3 {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-dim);
  margin-bottom: 6px;
  font-weight: 600;
}

.responsibility {
  font-size: 12px;
  padding: 3px 0;
  line-height: 1.4;
  display: flex;
  align-items: flex-start;
  gap: 6px;
}
.responsibility::before {
  content: "\203A";
  color: var(--green);
  font-weight: bold;
  flex-shrink: 0;
}
.collaborator {
  font-size: 12px;
  padding: 4px 6px;
  margin: 0 -6px;
  line-height: 1.4;
  display: flex;
  align-items: flex-start;
  gap: 6px;
  cursor: pointer;
  border-radius: 4px;
  transition: background 0.1s;
}
.collaborator:hover { background: #ffffff10; }
.collaborator::before {
  content: "\2192";
  color: var(--blue);
  font-weight: bold;
  flex-shrink: 0;
}
.collab-name { color: var(--blue); font-family: var(--mono); font-size: 11px; }
.collab-msgs { color: var(--text-dim); font-size: 10px; margin-left: 4px; }

/* ── Card Footer (data tags) ── */
.card-footer {
  padding: 8px 16px;
  border-top: 1px solid #ffffff08;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.data-tag {
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 10px;
  font-family: var(--mono);
  background: #ffffff10;
  color: var(--yellow);
  font-weight: 600;
}

/* ── Card Constraints ── */
.card-constraints {
  padding: 8px 16px 10px;
  border-top: 1px solid #ffffff08;
}
.card-constraints h3 {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-dim);
  margin-bottom: 4px;
  font-weight: 600;
}
.constraint {
  font-size: 11px;
  color: var(--orange);
  padding: 2px 0;
  line-height: 1.4;
}
.constraint::before { content: "!"; font-weight: bold; margin-right: 6px; }

/* ── Card Environment ── */
.card-env {
  padding: 6px 16px 8px;
  border-top: 1px solid #ffffff08;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.env-tag {
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 10px;
  font-family: var(--mono);
  background: #4ecca315;
  color: var(--green);
  border: 1px solid #4ecca330;
}

/* ══════════════════════════════════════
   EDIT MODE — card-shaped inline editor
   ══════════════════════════════════════ */

.edit-input, .edit-textarea {
  width: 100%;
  padding: 6px 10px;
  border: 1px solid #ffffff15;
  border-radius: 4px;
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  outline: none;
  transition: border-color 0.15s;
}
.edit-input:focus, .edit-textarea:focus {
  border-color: var(--green);
}
.edit-textarea {
  resize: vertical;
  min-height: 60px;
  line-height: 1.5;
}
.edit-input-inline {
  background: transparent;
  border: 1px solid transparent;
  border-bottom: 1px dashed #ffffff30;
  border-radius: 0;
  font-family: var(--mono);
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  padding: 2px 4px;
  width: auto;
}
.edit-input-inline:focus {
  border-color: var(--green);
  border-radius: 4px;
}
.edit-input-pkg {
  background: transparent;
  border: none;
  border-bottom: 1px dashed #ffffff30;
  font-size: 11px;
  color: var(--accent);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 2px 4px;
  width: 120px;
}
.edit-input-pkg:focus { border-color: var(--green); }

.edit-section {
  padding: 8px 16px;
  border-bottom: 1px solid #ffffff08;
}
.edit-section h3 {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-dim);
  margin-bottom: 6px;
  font-weight: 600;
}
.edit-hint {
  font-size: 10px;
  color: var(--text-dark);
  margin-bottom: 4px;
  font-style: italic;
}
.edit-actions {
  padding: 10px 16px;
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  border-top: 1px solid #ffffff10;
  background: #ffffff05;
}

/* ── SVG connections ── */
.connections-layer {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
}

/* ── Modal (for YAML export/import only) ── */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #00000080;
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid #ffffff15;
  border-radius: 12px;
  width: 700px;
  max-height: 85vh;
  overflow-y: auto;
  padding: 24px;
}
.modal h2 { font-size: 18px; margin-bottom: 16px; }
.modal .field { margin-bottom: 14px; }
.modal label {
  display: block;
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.modal textarea {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid #ffffff15;
  border-radius: 6px;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  font-family: var(--mono);
  min-height: 100px;
  resize: vertical;
}
.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 20px;
}
.yaml-output {
  background: var(--bg);
  border: 1px solid #ffffff15;
  border-radius: 6px;
  padding: 16px;
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.6;
  white-space: pre;
  overflow-x: auto;
  max-height: 60vh;
  color: var(--green);
}

@media (max-width: 1000px) {
  .crc-card, .crc-card.editing { width: 100%; }
  .board { padding: 16px; }
}
</style>
</head>
<body>

<header>
  <h1><span>d</span>spec CRC</h1>
  <div class="header-actions">
    <div class="peers" id="peers"></div>
    <span class="chip chip-offline" id="syncStatus">local</span>
    <button class="btn btn-sm" onclick="importYAML()">Import</button>
    <button class="btn btn-sm btn-green" onclick="exportAllYAML()">Export All</button>
    <button class="btn btn-accent" onclick="addNewCard()">+ New Card</button>
  </div>
</header>

<div class="toolbar">
  <label>Package:</label>
  <select id="packageFilter" onchange="render()">
    <option value="all">All packages</option>
  </select>
  <label>Cards:</label>
  <span class="chip chip-count" id="cardCount">0</span>
  <div style="flex:1"></div>
  <button class="btn btn-sm" onclick="toggleConnections()" id="connToggle">Show Links</button>
</div>

<svg class="connections-layer" id="connections"></svg>
<div class="board" id="board"></div>

<!-- YAML Export Modal -->
<div class="modal-overlay" id="yamlModal">
  <div class="modal">
    <h2 id="yamlModalTitle">Exported YAML</h2>
    <pre class="yaml-output" id="yamlOutput"></pre>
    <div class="modal-actions">
      <button class="btn" onclick="copyYAML()">Copy</button>
      <button class="btn" onclick="document.getElementById('yamlModal').classList.remove('open')">Close</button>
    </div>
  </div>
</div>

<!-- Import Modal -->
<div class="modal-overlay" id="importModal">
  <div class="modal">
    <h2>Import YAML Spec</h2>
    <div class="field">
      <label>Paste a .spec.yml file</label>
      <textarea id="importInput" rows="20" placeholder="object: InvoiceReconciler&#10;package: billing&#10;purpose: ..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="document.getElementById('importModal').classList.remove('open')">Cancel</button>
      <button class="btn btn-accent" onclick="doImport()">Import</button>
    </div>
  </div>
</div>

<script>
// ════════════════════
// State
// ════════════════════
let cards = [];
let editingIdx = -1;  // which card is in edit mode (-1 = none)
let showConnections = false;
let peerId = Math.random().toString(36).slice(2, 6);
let peerColor = `hsl(${Math.floor(Math.random() * 360)}, 70%, 55%)`;

// ════════════════════
// Card model
// ════════════════════
function makeCard(opts = {}) {
  return {
    name: opts.name || 'NewObject',
    package: opts.package || 'default',
    purpose: opts.purpose || '',
    data: opts.data || [],
    messages: opts.messages || [],
    collaborators: opts.collaborators || [],
    constraints: opts.constraints || [],
    environment: opts.environment || [],
  };
}

// ════════════════════
// Persistence
// ════════════════════
function saveState() { localStorage.setItem('dspec_cards', JSON.stringify(cards)); }
function loadState() {
  try { cards = JSON.parse(localStorage.getItem('dspec_cards')) || []; } catch(e) { cards = []; }
}

// ════════════════════
// Render
// ════════════════════
function render() {
  const board = document.getElementById('board');
  const filter = document.getElementById('packageFilter').value;
  const filtered = filter === 'all' ? cards : cards.filter(c => c.package === filter);

  board.innerHTML = filtered.map(card => {
    const idx = cards.indexOf(card);
    return idx === editingIdx ? renderEditCard(card, idx) : renderViewCard(card, idx);
  }).join('');

  document.getElementById('cardCount').textContent = filtered.length;
  updatePackageFilter();
  if (showConnections) drawConnections();
  saveState();
  broadcastState();
}

function renderViewCard(card, idx) {
  const responsibilities = card.messages.map(m => {
    const ret = m.returnType || 'Void';
    const algoPreview = m.algorithm ? m.algorithm.split(';')[0].trim() : '';
    return `<div class="responsibility"><span><strong>${esc(m.name)}</strong>(${esc(m.params || '')}) &rarr; ${esc(ret)}${algoPreview ? '<br><span style="color:var(--text-dim);font-size:11px">' + esc(algoPreview) + '&hellip;</span>' : ''}</span></div>`;
  }).join('') || '<span style="color:var(--text-dark);font-size:12px">No messages yet</span>';

  const collabs = card.collaborators.map(c =>
    `<div class="collaborator" onclick="highlightCard('${esc(c.name)}')"><span><span class="collab-name">${esc(c.name)}</span><span class="collab-msgs">${esc(c.messages.join(', '))}</span></span></div>`
  ).join('') || '<span style="color:var(--text-dark);font-size:12px">None</span>';

  const dataTags = card.data.map(d => `<span class="data-tag">${esc(d.name)}</span>`).join('');
  const constraintItems = card.constraints.map(c => `<div class="constraint">${esc(c)}</div>`).join('');
  const envTags = card.environment.map(e => `<span class="env-tag">${esc(e)}</span>`).join('');

  return `
    <div class="crc-card" id="card-${idx}" data-name="${esc(card.name)}" data-package="${esc(card.package)}">
      <div class="card-header">
        <div>
          <div class="card-package">${esc(card.package)}</div>
          <div class="card-name">${esc(card.name)}</div>
        </div>
        <div class="card-actions">
          <button class="card-btn" onclick="startEdit(${idx})" title="Edit">&#9998;</button>
          <button class="card-btn" onclick="exportOneYAML(${idx})" title="Export YAML">&#11053;</button>
          <button class="card-btn" onclick="duplicateCard(${idx})" title="Duplicate">&#10697;</button>
          <button class="card-btn delete" onclick="deleteCard(${idx})" title="Delete">&#10005;</button>
        </div>
      </div>
      ${card.purpose ? `<div class="card-purpose">${esc(card.purpose)}</div>` : ''}
      <div class="card-body">
        <div class="card-col"><h3>Responsibilities</h3>${responsibilities}</div>
        <div class="card-col"><h3>Collaborators</h3>${collabs}</div>
      </div>
      ${dataTags ? `<div class="card-footer">${dataTags}</div>` : ''}
      ${constraintItems ? `<div class="card-constraints"><h3>Constraints</h3>${constraintItems}</div>` : ''}
      ${envTags ? `<div class="card-env">${envTags}</div>` : ''}
    </div>`;
}

function renderEditCard(card, idx) {
  const dataVal = card.data.map(d =>
    `${d.name}: ${d.fields.map(f => f.name + ' ' + f.type).join(', ')}`
  ).join('\n');

  const msgsVal = card.messages.map(m =>
    `${m.name}(${m.params || ''}) -> ${m.returnType || 'Void'}${m.algorithm ? ' | ' + m.algorithm : ''}`
  ).join('\n');

  const collabVal = card.collaborators.map(c =>
    `${c.name}: ${c.messages.join(', ')}`
  ).join('\n');

  return `
    <div class="crc-card editing" id="card-${idx}" data-name="${esc(card.name)}">
      <!-- ── Header: name + package inline ── -->
      <div class="card-header edit-header">
        <div style="display:flex;flex-direction:column;gap:4px;flex:1">
          <input class="edit-input-pkg" id="e_pkg" value="${esc(card.package)}" placeholder="package">
          <input class="edit-input-inline" id="e_name" value="${esc(card.name)}" placeholder="ObjectName">
        </div>
        <div class="card-actions">
          <button class="btn btn-sm btn-green" onclick="saveEdit(${idx})">Save</button>
          <button class="btn btn-sm" onclick="cancelEdit()">Cancel</button>
        </div>
      </div>

      <!-- ── Purpose ── -->
      <div class="edit-section">
        <h3>Purpose</h3>
        <textarea class="edit-textarea" id="e_purpose" rows="2" placeholder="What does this object do and why?">${esc(card.purpose)}</textarea>
      </div>

      <!-- ── Two-column: Data | Collaborators ── -->
      <div class="card-body" style="min-height:auto">
        <div class="card-col">
          <h3>Data Structures</h3>
          <div class="edit-hint">Name: field Type, field Type</div>
          <textarea class="edit-textarea" id="e_data" rows="4" placeholder="Invoice: id UUID, amount Decimal">${esc(dataVal)}</textarea>
        </div>
        <div class="card-col">
          <h3>Collaborators</h3>
          <div class="edit-hint">ObjectName: msg1, msg2</div>
          <textarea class="edit-textarea" id="e_collabs" rows="4" placeholder="Notifier: send_alert, send_summary">${esc(collabVal)}</textarea>
        </div>
      </div>

      <!-- ── Responsibilities (full width, this is the main spec pane) ── -->
      <div class="edit-section">
        <h3>Responsibilities &mdash; Messages</h3>
        <div class="edit-hint">name(param Type, param Type) -> ReturnType | algo step; step; step</div>
        <textarea class="edit-textarea" id="e_msgs" rows="5" placeholder="match(invoices List&lt;Invoice&gt;) -> List&lt;Result&gt; | Index by prefix; Compare amounts; Sort">${esc(msgsVal)}</textarea>
      </div>

      <!-- ── Two-column: Constraints | Environment ── -->
      <div class="card-body" style="min-height:auto">
        <div class="card-col">
          <h3>Constraints</h3>
          <textarea class="edit-textarea" id="e_constraints" rows="3" placeholder="O(n log n) or better&#10;Never compare across currencies">${esc(card.constraints.join('\n'))}</textarea>
        </div>
        <div class="card-col">
          <h3>Environment</h3>
          <div class="edit-hint">language, tool, tool</div>
          <input class="edit-input" id="e_env" value="${esc(card.environment.join(', '))}" placeholder="python, postgresql">
        </div>
      </div>

      <div class="edit-actions">
        <button class="btn btn-sm" onclick="cancelEdit()">Cancel</button>
        <button class="btn btn-sm btn-green" onclick="saveEdit(${idx})">Save</button>
      </div>
    </div>`;
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function updatePackageFilter() {
  const sel = document.getElementById('packageFilter');
  const cur = sel.value;
  const pkgs = [...new Set(cards.map(c => c.package))].sort();
  sel.innerHTML = '<option value="all">All packages</option>' +
    pkgs.map(p => `<option value="${p}" ${p===cur?'selected':''}>${p}</option>`).join('');
}

// ════════════════════
// Edit mode
// ════════════════════
function startEdit(idx) {
  editingIdx = idx;
  render();
  const el = document.getElementById('e_name');
  if (el) el.focus();
}

function cancelEdit() {
  editingIdx = -1;
  render();
}

function saveEdit(idx) {
  cards[idx] = makeCard({
    name: document.getElementById('e_name').value.trim() || 'Unnamed',
    package: document.getElementById('e_pkg').value.trim() || 'default',
    purpose: document.getElementById('e_purpose').value.trim(),
    data: parseData(document.getElementById('e_data').value),
    messages: parseMessages(document.getElementById('e_msgs').value),
    collaborators: parseCollaborators(document.getElementById('e_collabs').value),
    constraints: parseLines(document.getElementById('e_constraints').value),
    environment: document.getElementById('e_env').value.split(',').map(s => s.trim()).filter(Boolean),
  });
  editingIdx = -1;
  render();
}

function addNewCard() {
  cards.push(makeCard({ name: 'NewObject', package: 'default' }));
  editingIdx = cards.length - 1;
  render();
  const board = document.getElementById('board');
  board.lastElementChild?.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// ════════════════════
// Card actions
// ════════════════════
function deleteCard(idx) {
  if (confirm(`Delete ${cards[idx].name}?`)) {
    if (editingIdx === idx) editingIdx = -1;
    else if (editingIdx > idx) editingIdx--;
    cards.splice(idx, 1);
    render();
  }
}

function duplicateCard(idx) {
  const copy = JSON.parse(JSON.stringify(cards[idx]));
  copy.name += 'Copy';
  cards.splice(idx + 1, 0, copy);
  render();
}

function highlightCard(name) {
  const el = document.querySelector(`[data-name="${name}"]`);
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    el.style.borderColor = 'var(--yellow)';
    el.style.boxShadow = '0 0 30px #f0c04050';
    setTimeout(() => { el.style.borderColor = ''; el.style.boxShadow = ''; }, 1500);
  }
}

// ════════════════════
// Parsers
// ════════════════════
function parseData(text) {
  return text.split('\n').filter(l => l.trim()).map(line => {
    const [name, ...rest] = line.split(':');
    const fields = rest.join(':').trim().split(',').filter(f => f.trim()).map(f => {
      const parts = f.trim().split(/\s+/);
      return { name: parts[0], type: parts.slice(1).join(' ') || 'String' };
    });
    return { name: name.trim(), fields };
  });
}

function parseMessages(text) {
  return text.split('\n').filter(l => l.trim()).map(line => {
    const [signature, ...algoParts] = line.split('|');
    const algorithm = algoParts.join('|').trim();
    const m = signature.match(/^(\w+)\(([^)]*)\)\s*->\s*(.+)$/);
    if (m) return { name: m[1], params: m[2].trim(), returnType: m[3].trim(), algorithm };
    return { name: signature.trim(), params: '', returnType: 'Void', algorithm };
  });
}

function parseCollaborators(text) {
  return text.split('\n').filter(l => l.trim()).map(line => {
    const [name, ...rest] = line.split(':');
    return { name: name.trim(), messages: rest.join(':').split(',').map(s => s.trim()).filter(Boolean) };
  });
}

function parseLines(text) { return text.split('\n').map(l => l.trim()).filter(Boolean); }

// ════════════════════
// YAML export/import
// ════════════════════
function cardToYAML(card) {
  let y = `object: ${card.name}\npackage: ${card.package}\n\npurpose: >\n  ${card.purpose || 'TODO: describe purpose'}\n\ndata:\n`;
  if (card.data.length === 0) {
    y += `  Item:\n    fields:\n      id: UUID\n`;
  } else {
    for (const d of card.data) {
      y += `  ${d.name}:\n    fields:\n`;
      for (const f of d.fields) y += `      ${f.name}: ${f.type}\n`;
    }
  }
  y += '\n';
  const msgNames = card.messages.map(m => m.name);
  if (msgNames.length) y += `protocols:\n  messages: [${msgNames.join(', ')}]\n\n`;
  y += `messages:\n`;
  if (card.messages.length === 0) {
    y += `  example:\n    input:\n      id: UUID\n    output: Void\n    algorithm:\n      - TODO\n`;
  } else {
    for (const m of card.messages) {
      y += `  ${m.name}:\n`;
      if (m.params) {
        y += `    input:\n`;
        for (const p of m.params.split(',').map(s=>s.trim()).filter(Boolean)) {
          const pp = p.split(/\s+/);
          y += `      ${pp[0]}: ${pp.slice(1).join(' ') || 'String'}\n`;
        }
      } else y += `    input: {}\n`;
      y += `    output: ${m.returnType || 'Void'}\n    algorithm:\n`;
      if (m.algorithm) {
        for (const step of m.algorithm.split(';').map(s=>s.trim()).filter(Boolean))
          y += `      - ${step}\n`;
      } else y += `      - TODO\n`;
    }
  }
  y += '\n';
  if (card.constraints.length) {
    y += `constraints:\n`;
    for (const c of card.constraints) y += `  - ${c}\n`;
    y += '\n';
  }
  if (card.environment.length) {
    y += `environment:\n  language: ${card.environment[0]}\n`;
    if (card.environment.length > 1) y += `  needs: [${card.environment.slice(1).join(', ')}]\n`;
    y += `  os: any\n\n`;
  }
  if (card.collaborators.length) {
    y += `dependencies:\n`;
    for (const c of card.collaborators) y += `  ${c.name}:\n    messages: [${c.messages.join(', ')}]\n`;
  }
  return y;
}

function exportAllYAML() {
  if (!cards.length) { alert('No cards'); return; }
  document.getElementById('yamlModalTitle').textContent = 'Exported YAML — All Cards';
  document.getElementById('yamlOutput').textContent = cards.map(c => cardToYAML(c)).join('\n---\n\n');
  document.getElementById('yamlModal').classList.add('open');
}

function exportOneYAML(idx) {
  document.getElementById('yamlModalTitle').textContent = `Exported: ${cards[idx].name}`;
  document.getElementById('yamlOutput').textContent = cardToYAML(cards[idx]);
  document.getElementById('yamlModal').classList.add('open');
}

function copyYAML() {
  navigator.clipboard.writeText(document.getElementById('yamlOutput').textContent)
    .then(() => alert('Copied!'));
}

function importYAML() {
  document.getElementById('importInput').value = '';
  document.getElementById('importModal').classList.add('open');
}

function doImport() {
  try {
    const card = parseYAMLSpec(document.getElementById('importInput').value);
    cards.push(card);
    document.getElementById('importModal').classList.remove('open');
    render();
  } catch (e) { alert('Parse error: ' + e.message); }
}

function parseYAMLSpec(text) {
  const getName = (key) => { const m = text.match(new RegExp(`^${key}:\\s*(.+)$`, 'm')); return m ? m[1].trim() : ''; };
  const name = getName('object') || 'Imported';
  const pkg = getName('package') || 'default';
  let purpose = '';
  const pm = text.match(/^purpose:\s*>?\s*\n((?:\s+.+\n?)*)/m);
  if (pm) purpose = pm[1].replace(/\n\s*/g, ' ').trim();
  else purpose = getName('purpose');

  const data = [];
  const dm = text.match(/^data:\n((?:\s+.+\n?)*)/m);
  if (dm) {
    const re = /^  (\w+):\n((?:\s{4}.+\n?)*)/gm;
    let m;
    while ((m = re.exec(dm[1])) !== null) {
      if (m[1] === 'description') continue;
      const fields = [];
      const fr = /^\s{6}(\w+):\s*(.+)$/gm;
      let fm;
      while ((fm = fr.exec(m[2])) !== null) {
        if (['type','enum','default','description'].includes(fm[1])) continue;
        fields.push({ name: fm[1], type: fm[2].trim() });
      }
      if (fields.length) data.push({ name: m[1], fields });
    }
  }

  const messages = [];
  const mm = text.match(/^messages:\n((?:\s+.+\n?)*)/m);
  if (mm) {
    const re = /^  (\w+):\n((?:\s{4}.+\n?)*)/gm;
    let m;
    while ((m = re.exec(mm[1])) !== null) {
      let params = '';
      const im = m[2].match(/input:\n((?:\s{6}\w+:.+\n?)*)/);
      if (im) {
        params = (im[1].match(/^\s{6}(\w+):\s*(.+)$/gm) || []).map(l => {
          const p = l.match(/^\s+(\w+):\s*(.+)$/);
          return p ? `${p[1]} ${p[2].trim()}` : '';
        }).filter(Boolean).join(', ');
      }
      const om = m[2].match(/output:\s*(.+)/);
      const steps = [];
      const am = m[2].match(/algorithm:\n((?:\s{6}-.+\n?)*)/);
      if (am) { const sr = /^\s{6}-\s*(.+)$/gm; let s; while ((s = sr.exec(am[1])) !== null) steps.push(s[1].trim()); }
      messages.push({ name: m[1], params, returnType: om ? om[1].trim() : 'Void', algorithm: steps.join('; ') });
    }
  }

  const collaborators = [];
  const dpm = text.match(/^dependencies:\n((?:\s+.+\n?)*)/m);
  if (dpm) {
    const re = /^  (\w+):\n((?:\s{4}.+\n?)*)/gm;
    let m;
    while ((m = re.exec(dpm[1])) !== null) {
      const mm2 = m[2].match(/messages:\s*\[([^\]]+)\]/);
      collaborators.push({ name: m[1], messages: mm2 ? mm2[1].split(',').map(s=>s.trim()) : [] });
    }
  }

  const constraints = [];
  const cm = text.match(/^constraints:\n((?:\s+-\s+.+\n?)*)/m);
  if (cm) { const cr = /^\s+-\s+(.+)$/gm; let c; while ((c = cr.exec(cm[1])) !== null) constraints.push(c[1].trim()); }

  const environment = [];
  const lm = text.match(/language:\s*(.+)/);
  if (lm) environment.push(lm[1].trim());
  const nm = text.match(/needs:\s*\[([^\]]+)\]/);
  if (nm) environment.push(...nm[1].split(',').map(s=>s.trim()));

  return makeCard({ name, package: pkg, purpose, data, messages, collaborators, constraints, environment });
}

// ════════════════════
// Connections
// ════════════════════
function toggleConnections() {
  showConnections = !showConnections;
  document.getElementById('connToggle').textContent = showConnections ? 'Hide Links' : 'Show Links';
  if (showConnections) drawConnections();
  else document.getElementById('connections').innerHTML = '';
}

function drawConnections() {
  const svg = document.getElementById('connections');
  svg.innerHTML = '';
  const positions = new Map();
  document.querySelectorAll('.crc-card').forEach(el => {
    const r = el.getBoundingClientRect();
    positions.set(el.dataset.name, { x: r.left + r.width/2, y: r.top + r.height/2 });
  });
  for (const card of cards) {
    const from = positions.get(card.name);
    if (!from) continue;
    for (const c of card.collaborators) {
      const to = positions.get(c.name);
      if (!to) continue;
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', from.x); line.setAttribute('y1', from.y);
      line.setAttribute('x2', to.x); line.setAttribute('y2', to.y);
      line.setAttribute('stroke', '#e9456050');
      line.setAttribute('stroke-width', '2');
      line.setAttribute('stroke-dasharray', '6 4');
      svg.appendChild(line);
    }
  }
}

// ════════════════════
// WebSocket Sync (collaborative)
// ════════════════════
let ws = null;
let peers = new Map();

function connectSync() {
  const params = new URLSearchParams(window.location.search);
  const wsUrl = params.get('sync');
  if (!wsUrl) return;

  try {
    ws = new WebSocket(wsUrl);
    ws.onopen = () => {
      document.getElementById('syncStatus').className = 'chip chip-sync';
      document.getElementById('syncStatus').textContent = 'synced';
      ws.send(JSON.stringify({ type: 'join', peer: peerId, color: peerColor }));
    };
    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'state' && msg.peer !== peerId) {
        cards = msg.cards;
        editingIdx = -1;
        render();
      }
      if (msg.type === 'join' && msg.peer !== peerId) {
        peers.set(msg.peer, msg.color);
        renderPeers();
      }
      if (msg.type === 'leave') {
        peers.delete(msg.peer);
        renderPeers();
      }
    };
    ws.onclose = () => {
      document.getElementById('syncStatus').className = 'chip chip-offline';
      document.getElementById('syncStatus').textContent = 'offline';
      setTimeout(connectSync, 3000);
    };
  } catch(e) { /* sync is optional */ }
}

function broadcastState() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'state', peer: peerId, cards }));
  }
}

function renderPeers() {
  const el = document.getElementById('peers');
  el.innerHTML = [...peers.entries()].map(([id, color]) =>
    `<div class="peer-dot" style="background:${color}" title="Peer: ${id}">${id.slice(0,2).toUpperCase()}</div>`
  ).join('');
}

// ════════════════════
// Init
// ════════════════════
loadState();

fetch('/api/preload')
  .then(r => r.json())
  .then(preloaded => {
    if (preloaded && preloaded.length) {
      const existing = new Set(cards.map(c => c.name));
      for (const card of preloaded) {
        if (!existing.has(card.name)) cards.push(card);
      }
    }
    render();
  })
  .catch(() => render());

connectSync();

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (editingIdx >= 0) cancelEdit();
    document.getElementById('yamlModal').classList.remove('open');
    document.getElementById('importModal').classList.remove('open');
  }
  if (e.ctrlKey && e.key === 'Enter' && editingIdx >= 0) {
    saveEdit(editingIdx);
  }
});

window.addEventListener('scroll', () => { if (showConnections) drawConnections(); });
window.addEventListener('resize', () => { if (showConnections) drawConnections(); });
</script>
